<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Waleed Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;800&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; width: 100%; position: relative; }
        
        .main-nav { height: 60px; background: white; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 5000; }
        .nav-grid { display: grid; grid-template-columns: 1fr auto 1fr; width: 100%; align-items: center; }
        
        .brand-icon { width: 46px; height: auto; object-fit: contain; }
        .brand-text { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; line-height: 1; margin-top: 2px; }

        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 80%; max-width: 300px; background: white; height: 100vh; position: fixed; left: -110%; top: 0; z-index: 6000; }
        .sidebar.active { left: 0; }
        /* Header Match: Custom Primary Yellow theme execution */
        .sidebar-header { background: #ffb01c; color: #0f172a; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 18px; }
        
        .cart-drawer { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 85%; max-width: 350px; background: white; height: 100dvh; position: fixed; right: -110%; top: 0; z-index: 6000; display: flex; flex-direction: column; box-shadow: -5px 0 25px rgba(0,0,0,0.1); }
        .cart-drawer.active { right: 0; }
        .cart-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; flex-shrink: 0; }

        #cartItemsList { flex: 1; overflow-y: auto; padding: 1rem; }
        .cart-footer { padding: 15px; border-top: 1px solid #f1f5f9; background: white; flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 5500; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        .slider-wrapper { width: 100%; position: relative; border-radius: 1.5rem; overflow: hidden; background: #f8fafc; border: 1px solid #f1f5f9; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; width: 100%; aspect-ratio: 1/1; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; width: 100%; scroll-snap-align: start; scroll-snap-stop: always; display: flex; align-items: center; justify-content: center; position: relative; }
        .slide img { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        /* Thumbnails style with specific custom yellow accent colors */
        .thumb-img, .thumb-video { width: 55px; height: 55px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color 0.2s ease; }
        .thumb-img { object-fit: cover; }
        .thumb-video { background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #ffb01c; border: 2px dashed #cbd5e1; }
        .thumb-img.active, .thumb-video.active { border-color: #ffb01c; border-style: solid; background: #fffbeb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-[70px]">

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <nav class="main-nav">
        <div class="nav-grid">
            <div class="flex justify-start">
                <button onclick="toggleSidebar()" class="text-slate-900 text-xl p-2">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
            </div>
            <div class="flex flex-col items-center">
                <img src="https://i.ibb.co/rRbDwhRk/42980-removebg-preview.png" class="brand-icon">
                <div class="brand-text">WALEED <span class="text-[#ffb01c]">STORE</span></div>
            </div>
            <div class="flex justify-end">
                <div class="relative p-2 cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping text-xl text-slate-800"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-[#ffb01c] text-slate-900 text-[10px] w-4 h-4 flex items-center justify-center rounded-full border border-white font-bold">0</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span>Menu</span>
            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <nav class="p-4">
            <a href="https://waleedstore.me" class="flex items-center gap-4 p-4 text-slate-700 font-semibold border-b border-slate-50">
                <i class="fa-solid fa-house text-[#ffb01c] w-5"></i> Home
            </a>
            <a href="https://waleedstore.me/#contact-section" class="flex items-center gap-4 p-4 text-slate-700 font-semibold border-b border-slate-50">
                <i class="fa-solid fa-envelope text-[#ffb01c] w-5"></i> Contact Us
            </a>
        </nav>
    </div>

    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <span>Your Cart</span>
            <button onclick="toggleCart()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div id="cartItemsList" class="space-y-4"></div>

        <div class="cart-footer">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-500 font-bold uppercase text-xs tracking-widest">Total</span>
                <span id="cartTotal" class="text-xl font-black text-[#ffb01c]">Rs. 0</span>
            </div>
            <button onclick="window.location.href='checkout.html'" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-slate-800 transition-colors">Check Out</button>
        </div>
    </div>

    <div class="container mx-auto px-4">
        <div class="mb-4">
            <div class="slider-wrapper">
                <div id="imageSlider" class="slider-container"></div>
            </div>
            <div id="thumbContainer" class="flex gap-2 overflow-x-auto no-scrollbar py-3"></div>
        </div>

        <div class="pb-32">
            <h1 id="pName" class="text-lg font-bold text-slate-900 mb-1">Loading...</h1>
            <div class="flex items-center gap-3 mb-4">
                <span id="pOldPrice" class="text-sm text-slate-400 line-through"></span>
                <span id="pPrice" class="text-xl font-black text-slate-900"></span>
            </div>

            <div id="variationsSection" class="mb-6 hidden">
                <h3 class="text-[10px] font-black text-slate-900 uppercase tracking-[0.2em] mb-2">Select Option</h3>
                <div id="variationsContainer" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="pt-5 border-t border-slate-100">
                <h3 class="text-[10px] font-black text-slate-900 uppercase tracking-[0.2em] mb-3">Product Description</h3>
                <p id="pDesc" class="text-slate-700 text-[15px] leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white/95 backdrop-blur-md border-t border-slate-100 flex gap-3 z-40">
        <button onclick="handleAddToCart()" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-xl font-bold text-sm hover:bg-slate-200 transition-colors">Add to Cart</button>
        <button onclick="handleBuyNow()" class="flex-1 bg-[#ffb01c] text-slate-900 py-4 rounded-xl font-bold text-sm shadow-lg shadow-amber-100/50 hover:bg-[#e09810] transition-colors">Buy Now</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBYrmozXYLHxCmLsc8FX6aN6xSvORxXypo",
            authDomain: "waleed-store-f7369.firebaseapp.com",
            databaseURL: "https://waleed-store-f7369-default-rtdb.firebaseio.com/",
            projectId: "waleed-store-f7369",
            storageBucket: "waleed-store-f7369.appspot.com",
            messagingSenderId: "148677610444",
            appId: "1:148677610444:web:2a838575003504f216503c"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentProduct = null; 
        let selectedVariationName = ""; 
        let selectedVariationPrice = ""; 

        // =================== LIVE TRAFFIC BACKGROUND ENGINE ===================
        let userUUID = localStorage.getItem('user_chat_id');
        if (!userUUID) {
            userUUID = 'USER-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('user_chat_id', userUUID);
        }

        function sendLiveSignal(productName = "Product Page") {
            database.ref(`live_status/${userUUID}`).set({
                currentPage: productName,
                lastActive: Date.now()
            });
        }

        window.addEventListener('beforeunload', function () {
            database.ref(`live_status/${userUUID}`).remove();
        });
        // ======================================================================

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleCart() {
            const cart = document.getElementById('cartDrawer');
            const overlay = document.getElementById('overlay');
            cart.classList.toggle('active');
            overlay.classList.toggle('active');
            if(cart.classList.contains('active')) {
                renderCart();
            }
        }

        function closeAll() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('cartDrawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            
            let videoId = null;
            try {
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('youtube.com/embed/')) {
                    videoId = url.split('youtube.com/embed/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0];
                } else if (url.includes('shorts/')) {
                    videoId = url.split('shorts/')[1].split(/[?#]/)[0];
                }
            } catch(e) {
                console.error("Error parsing YouTube URL", e);
            }

            if (videoId && videoId.trim().length === 11) {
                return "https://www.youtube.com/embed/" + videoId.trim() + "?rel=0&modestbranding=1";
            }
            return null;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            database.ref('products/' + productId).once('value', (snapshot) => {
                const p = snapshot.val();
                if (p) {
                    currentProduct = p; 
                    document.getElementById('pName').innerText = p.name;
                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                    if(p.originalPrice) document.getElementById('pOldPrice').innerText = 'Rs. ' + p.originalPrice;
                    document.getElementById('pDesc').innerText = p.desc;
                    
                    sendLiveSignal(`Viewing: ${p.name}`);
                    setInterval(() => { sendLiveSignal(`Viewing: ${p.name}`); }, 25000);

                    database.ref('site_traffic').push({
                        page: `Product: ${p.name}`,
                        timestamp: Date.now()
                    });

                    const slider = document.getElementById('imageSlider');
                    const thumbContainer = document.getElementById('thumbContainer');

                    let slideCount = 0;
                    let totalImagesToLoad = [];
                    const mainImages = p.images || [p.image];
                    
                    mainImages.forEach((img) => {
                        if (img && img.trim() !== '') {
                            totalImagesToLoad.push(img);
                        }
                    });

                    if (p.variations && p.variations.length > 0) {
                        p.variations.forEach((v) => {
                            if (v.image && v.image.trim() !== '') {
                                if (!totalImagesToLoad.includes(v.image)) {
                                    totalImagesToLoad.push(v.image);
                                }
                            }
                        });
                    }

                    totalImagesToLoad.forEach((img) => {
                        const slide = document.createElement('div');
                        slide.className = 'slide';
                        slide.innerHTML = `<img src="${img}">`;
                        slider.appendChild(slide);

                        const thumb = document.createElement('img');
                        thumb.src = img;
                        thumb.className = `thumb-img thumb-item ${slideCount === 0 ? 'active' : ''}`;
                        
                        const currentIndex = slideCount;
                        thumb.onclick = () => {
                            slider.scrollTo({ left: slider.clientWidth * currentIndex, behavior: 'smooth' });
                        };
                        thumbContainer.appendChild(thumb);
                        slideCount++;
                    });

                    if (p.video && p.video.trim() !== '') {
                        const embedUrl = getYouTubeEmbedUrl(p.video);
                        if (embedUrl) {
                            const videoIndex = slideCount;

                            const videoSlide = document.createElement('div');
                            videoSlide.className = 'slide bg-black';
                            videoSlide.innerHTML = `
                                <div class="w-full h-full p-1 flex items-center justify-center aspect-square">
                                    <iframe class="w-full h-full rounded-xl" src="${embedUrl}" title="Product Video Player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>`;
                            slider.appendChild(videoSlide);

                            const videoThumb = document.createElement('div');
                            videoThumb.className = 'thumb-video thumb-item';
                            videoThumb.innerHTML = `<i class="fa-solid fa-play text-lg"></i>`;
                            videoThumb.onclick = () => {
                                slider.scrollTo({ left: slider.clientWidth * videoIndex, behavior: 'smooth' });
                            };
                            thumbContainer.appendChild(videoThumb);
                            slideCount++;
                        }
                    }

                    if (p.variations && p.variations.length > 0) {
                        document.getElementById('variationsSection').classList.remove('hidden');
                        const varContainer = document.getElementById('variationsContainer');
                        
                        p.variations.forEach((v, index) => {
                            const btn = document.createElement('button');
                            btn.innerText = v.name;
                            btn.className = `var-btn px-4 py-2 text-xs font-semibold rounded-lg border transition-all ${index === 0 ? 'border-[#ffb01c] bg-amber-50/40 text-slate-900 font-bold' : 'border-slate-200 text-slate-700 bg-white'}`;
                            
                            if(index === 0) {
                                selectedVariationName = v.name;
                                if (v.price && v.price.trim() !== '') {
                                    selectedVariationPrice = v.price;
                                    document.getElementById('pPrice').innerText = 'Rs. ' + v.price;
                                }
                            }

                            btn.onclick = () => {
                                document.querySelectorAll('.var-btn').forEach(b => {
                                    b.classList.remove('border-[#ffb01c]', 'bg-amber-50/40', 'text-slate-900', 'font-bold');
                                    b.classList.add('border-slate-200', 'text-slate-700', 'bg-white');
                                });
                                btn.classList.remove('border-slate-200', 'text-slate-700', 'bg-white');
                                btn.classList.add('border-[#ffb01c]', 'bg-amber-50/40', 'text-slate-900', 'font-bold');
                                
                                selectedVariationName = v.name;

                                if (v.price && v.price.trim() !== '') {
                                    selectedVariationPrice = v.price;
                                    document.getElementById('pPrice').innerText = 'Rs. ' + v.price;
                                } else {
                                    selectedVariationPrice = "";
                                    document.getElementById('pPrice').innerText = 'Rs. ' + p.price;
                                }

                                if (v.image && v.image.trim() !== '') {
                                    const matchedIndex = totalImagesToLoad.indexOf(v.image);
                                    if (matchedIndex !== -1) {
                                        slider.scrollTo({ left: slider.clientWidth * matchedIndex, behavior: 'smooth' });
                                    }
                                } else if (v.imageIndex !== undefined && v.imageIndex < slideCount) {
                                    slider.scrollTo({ left: slider.clientWidth * v.imageIndex, behavior: 'smooth' });
                                }
                            };
                            varContainer.appendChild(btn);
                        });
                    }

                    let isScrolling;
                    slider.addEventListener('scroll', () => {
                        window.clearTimeout(isScrolling);
                        isScrolling = setTimeout(() => {
                            const index = Math.round(slider.scrollLeft / slider.clientWidth);
                            const allThumbs = document.querySelectorAll('.thumb-item');
                            
                            allThumbs.forEach((thumb, i) => {
                                if(i === index) {
                                    thumb.classList.add('active');
                                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                                } else {
                                    thumb.classList.remove('active');
                                }
                            });
                        }, 60);
                    });
                }
            });
        } else {
            sendLiveSignal("Product Page (No ID)");
            setInterval(() => { sendLiveSignal("Product Page (No ID)"); }, 25000);
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const list = document.getElementById('cartItemsList');
            let total = 0;
            list.innerHTML = cart.length ? "" : `<div class="text-center py-20 text-slate-300 text-xs">Cart is empty</div>`;
            
            cart.forEach((item, index) => {
                const priceNum = parseInt(item.price.toString().replace(/\D/g,''));
                total += (priceNum * (item.quantity || 1));
                list.innerHTML += `
                    <div class="flex gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <img src="${item.img}" class="w-14 h-14 rounded-lg object-cover bg-white border">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-xs font-bold text-slate-800 truncate">${item.name}</h4>
                            <p class="text-[#ffb01c] font-black text-sm">${item.price}</p>
                            ${item.variation ? `<p class="text-slate-500 font-medium text-[11px]">Option: ${item.variation}</p>` : ''}
                            <p class="text-[10px] text-slate-400">Qty: ${item.quantity || 1}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash-can text-sm"></i></button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = 'Rs. ' + total;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function handleAddToCart() {
            if(!currentProduct) return;
            
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let finalPrice = (selectedVariationPrice && selectedVariationPrice.trim() !== '') ? 'Rs. ' + selectedVariationPrice : currentProduct.price;

            cart.push({ 
                name: currentProduct.name, 
                price: finalPrice, 
                img: (currentProduct.images && currentProduct.images.length > 0) ? currentProduct.images[0] : (currentProduct.image || ''),
                deliveryCharges: currentProduct.delivery || 0,
                codFee: currentProduct.cod_fee || 0,
                variation: selectedVariationName,
                quantity: 1
            });
            
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            toggleCart();
        }

        function handleBuyNow() {
            handleAddToCart();
            setTimeout(() => {
                window.location.href = 'checkout.html';
            }, 100);
        }

        document.getElementById('cart-count').innerText = (JSON.parse(localStorage.getItem('cart')) || []).length;
    </script>
</body>
</html>
